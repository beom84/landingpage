<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 380" width="100%" height="100%">
  <defs>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.04" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.02" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#F8F9FA"/>

  <rect x="20" y="20" width="500" height="340" rx="24" fill="#FFFFFF" filter="url(#soft-shadow)"/>

  <text x="40" y="55" font-family="'Pretendard', 'Noto Sans KR', sans-serif" font-size="18" font-weight="700" fill="#1A1D20">일과 회고 및 조정</text>

  <rect x="40" y="72" width="460" height="6" rx="3" fill="#E9ECEF" />
  <rect x="40" y="72" width="290" height="6" rx="3" fill="#22C55E" />

  <rect x="40" y="98" width="215" height="190" rx="16" fill="#FBF7E7"/>
  <text x="56" y="124" font-family="'Pretendard', sans-serif" font-size="14" font-weight="700" fill="#3A3A3C">기획된 일</text>
  
  <g font-family="'Pretendard', sans-serif" font-size="13" font-weight="500" fill="#48484A">
    <circle cx="64" cy="154" r="7" fill="none" stroke="#C7C7CC" stroke-width="1.5"/>
    <text x="80" y="158">(1) 기획</text>
    <circle cx="64" cy="184" r="7" fill="none" stroke="#C7C7CC" stroke-width="1.5"/>
    <text x="80" y="188">(2) 매출 피드백</text>
    <circle cx="64" cy="214" r="7" fill="none" stroke="#C7C7CC" stroke-width="1.5"/>
    <text x="80" y="218">(3) 퇴근</text>
    <circle cx="64" cy="244" r="7" fill="none" stroke="#C7C7CC" stroke-width="1.5"/>
    <text x="80" y="248">(4) 식사</text>
    <circle cx="64" cy="274" r="7" fill="none" stroke="#C7C7CC" stroke-width="1.5"/>
    <text x="80" y="278">(5) 블로그</text>
  </g>

  <rect x="285" y="98" width="215" height="190" rx="16" fill="#EFEFFA"/>
  <text x="301" y="124" font-family="'Pretendard', sans-serif" font-size="14" font-weight="700" fill="#3A3A3C">실제 한 일</text>

  <g font-family="'Pretendard', sans-serif" font-size="13" font-weight="600" fill="#1C1C1E">
    <text x="301" y="158">팀장님 보고</text>
    <circle cx="480" cy="154" r="8" fill="#22C55E"/>
    <path d="M476.5 154 l2.5 2.5 l4.5 -4.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <text x="301" y="188">홈페이지 기획</text>
    <circle cx="480" cy="184" r="8" fill="#22C55E"/>
    <path d="M476.5 184 l2.5 2.5 l4.5 -4.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="301" y="218">매출 피드백</text>
    <circle cx="480" cy="218" r="8" fill="#22C55E"/>
    <path d="M476.5 218 l2.5 2.5 l4.5 -4.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="301" y="248">퇴근</text>
    <circle cx="480" cy="244" r="8" fill="#22C55E"/>
    <path d="M476.5 244 l2.5 2.5 l4.5 -4.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="301" y="278">식사</text>
    <circle cx="480" cy="274" r="8" fill="#22C55E"/>
    <path d="M476.5 274 l2.5 2.5 l4.5 -4.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
