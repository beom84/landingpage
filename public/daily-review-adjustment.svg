  <text x="40" y="318" font-family="'Pretendard', sans-serif" font-size="14" font-weight="700" fill="#1A1D20">행동 조정 제안</text>
  <text x="40" y="338" font-family="'Pretendard', sans-serif" font-size="13" font-weight="400" fill="#636E72">실제 수행된 항목을 바탕으로 다음 기획을 업데이트했습니다.</text>
